<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чистий Google для Chrome</title>
    <link rel="search" type="application/opensearchdescription+xml" title="Google (Тільки UA/EN)" href="opensearch.xml">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; color: #a0a0a0; margin-bottom: 30px; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background-color: #0A84FF;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .instructions { font-size: 14px; margin-top: 40px; color: #666; text-align: left;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Встановлення пошуку</h1>
        <p>Зробіть один тестовий запит, щоб Chrome запам'ятав безпечні налаштування.</p>
        
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Введіть щось, наприклад 'тест'" required>
            <input type="hidden" name="lr" value="lang_uk|lang_en">
            <button type="submit">Тестовий пошук</button>
        </form>

        <div class="instructions">
            <p><b>Що робити далі:</b></p>
            <ol style="padding-left: 20px;">
                <li>Після пошуку поверніться на головний екран Chrome.</li>
                <li>Відкрийте <b>Налаштування</b> -> <b>Пошукова система</b>.</li>
                <li>У розділі "Нещодавно відвідані" оберіть <b>Google (Тільки UA/EN)</b>.</li>
            </ol>
        </div>
    </div>
</body>
</html>
